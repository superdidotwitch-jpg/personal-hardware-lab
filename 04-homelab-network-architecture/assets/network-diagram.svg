<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Homelab network diagram</title>
  <desc>Network topology: internet → ISP modem → TP-Link Archer MR500 router → unmanaged switch → Main PC + Secondary PC (ethernet). Nintendo Switch via Wi-Fi. Raspberry Pi and Mini PC planned.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .label { font-size: 14px; font-weight: 600; }
      .sub { font-size: 12px; fill: #555; }
      .box-blue { fill: #E6F1FB; stroke: #185FA5; }
      .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; }
      .box-coral { fill: #FAECE7; stroke: #993C1D; stroke-dasharray: 5 3; }
      .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
      .line-eth { stroke: #888780; stroke-width: 1.5; fill: none; }
      .line-wifi { stroke: #1D9E75; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .line-planned { stroke: #888780; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      .line-solid { stroke: #378ADD; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Internet -->
  <rect x="265" y="20" width="150" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
  <text x="340" y="47" text-anchor="middle" class="label">Internet</text>

  <line x1="340" y1="64" x2="340" y2="104" class="line-solid" marker-end="url(#arrow)"/>

  <!-- ISP Modem -->
  <rect x="240" y="104" width="200" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
  <text x="340" y="128" text-anchor="middle" class="label">ISP modem</text>
  <text x="340" y="148" text-anchor="middle" class="sub">provided by ISP</text>

  <line x1="340" y1="160" x2="340" y2="200" class="line-solid" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="210" y="200" width="260" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="340" y="224" text-anchor="middle" class="label">Router</text>
  <text x="340" y="244" text-anchor="middle" class="sub">TP-Link Archer MR500</text>

  <!-- Wi-Fi to Nintendo Switch -->
  <path d="M470 228 L560 228 L560 330" class="line-wifi" marker-end="url(#arrow)"/>
  <text x="530" y="282" text-anchor="middle" class="sub" fill="#0F6E56">Wi-Fi</text>

  <!-- Nintendo Switch -->
  <rect x="490" y="330" width="160" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="570" y="354" text-anchor="middle" class="label">Nintendo Switch</text>
  <text x="570" y="374" text-anchor="middle" class="sub">Wi-Fi client</text>

  <!-- Router to switch -->
  <line x1="340" y1="256" x2="340" y2="300" class="line-eth" marker-end="url(#arrow)"/>
  <text x="358" y="282" class="sub" fill="#5F5E5A">ethernet</text>

  <!-- Unmanaged switch -->
  <rect x="215" y="300" width="250" height="56" rx="8" stroke-width="0.5" class="box-gray"/>
  <text x="340" y="324" text-anchor="middle" class="label">Unmanaged switch</text>
  <text x="340" y="344" text-anchor="middle" class="sub">distributes ethernet</text>

  <!-- Switch to PCs -->
  <line x1="280" y1="356" x2="180" y2="420" class="line-eth" marker-end="url(#arrow)"/>
  <line x1="400" y1="356" x2="480" y2="420" class="line-eth" marker-end="url(#arrow)"/>

  <!-- Main PC -->
  <rect x="60" y="420" width="190" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="155" y="444" text-anchor="middle" class="label">Main PC</text>
  <text x="155" y="464" text-anchor="middle" class="sub">ethernet · primary rig</text>

  <!-- Secondary PC -->
  <rect x="430" y="420" width="190" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="525" y="444" text-anchor="middle" class="label">Secondary PC</text>
  <text x="525" y="464" text-anchor="middle" class="sub">ethernet · guest/workstation</text>

  <!-- Future devices -->
  <path d="M340 356 L340 500" class="line-planned"/>
  <line x1="260" y1="500" x2="220" y2="500" class="line-planned" marker-end="url(#arrow)"/>
  <line x1="420" y1="500" x2="460" y2="500" class="line-planned" marker-end="url(#arrow)"/>

  <rect x="60" y="488" width="160" height="44" rx="8" stroke-width="0.5" class="box-coral"/>
  <text x="140" y="508" text-anchor="middle" class="label" fill="#712B13">Raspberry Pi</text>
  <text x="140" y="524" text-anchor="middle" class="sub" fill="#993C1D">network services</text>

  <rect x="460" y="488" width="160" height="44" rx="8" stroke-width="0.5" class="box-coral"/>
  <text x="540" y="508" text-anchor="middle" class="label" fill="#712B13">Mini PC</text>
  <text x="540" y="524" text-anchor="middle" class="sub" fill="#993C1D">server / NAS</text>

  <!-- Legend -->
  <line x1="40" y1="294" x2="72" y2="294" stroke="#888780" stroke-width="1.5"/>
  <text x="78" y="298" class="sub" dominant-baseline="central">ethernet</text>
  <line x1="40" y1="312" x2="72" y2="312" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="78" y="316" class="sub" dominant-baseline="central">Wi-Fi</text>
  <line x1="40" y1="330" x2="72" y2="330" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="78" y="334" class="sub" dominant-baseline="central">planned (future)</text>
</svg>
