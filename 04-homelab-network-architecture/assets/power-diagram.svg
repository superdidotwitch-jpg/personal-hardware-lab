<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Homelab power diagram</title>
  <desc>Power flow from wall outlet through surge protector to all devices: main PC, secondary PC, router, unmanaged switch, and Raspberry Pi (planned). UPS shown as future upgrade.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .label { font-size: 14px; font-weight: 600; }
      .sub { font-size: 12px; fill: #555; }
      .box-amber { fill: #FAEEDA; stroke: #854F0B; }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; }
      .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
      .box-coral { fill: #FAECE7; stroke: #993C1D; stroke-dasharray: 5 3; }
      .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
      .box-planned { fill: none; stroke: #888780; stroke-dasharray: 5 3; }
      .line-power { stroke: #BA7517; stroke-width: 1.5; fill: none; }
      .line-planned { stroke: #888780; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      .line-solid { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Wall outlet -->
  <rect x="265" y="20" width="150" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
  <text x="340" y="47" text-anchor="middle" class="label">Wall outlet</text>

  <line x1="340" y1="64" x2="340" y2="110" class="line-solid" marker-end="url(#arrow)"/>
  <text x="358" y="90" class="sub" dominant-baseline="central">AC mains</text>

  <!-- Surge protector -->
  <rect x="195" y="110" width="290" height="56" rx="8" stroke-width="0.5" class="box-amber"/>
  <text x="340" y="134" text-anchor="middle" class="label">Surge protector</text>
  <text x="340" y="154" text-anchor="middle" class="sub">central power distribution</text>

  <!-- Power bus -->
  <line x1="340" y1="166" x2="340" y2="230" class="line-power"/>
  <line x1="90" y1="230" x2="590" y2="230" class="line-power"/>
  <line x1="90"  y1="230" x2="90"  y2="290" class="line-power" marker-end="url(#arrow)"/>
  <line x1="215" y1="230" x2="215" y2="290" class="line-power" marker-end="url(#arrow)"/>
  <line x1="340" y1="230" x2="340" y2="290" class="line-power" marker-end="url(#arrow)"/>
  <line x1="465" y1="230" x2="465" y2="290" class="line-power" marker-end="url(#arrow)"/>
  <line x1="590" y1="230" x2="590" y2="290" class="line-power" marker-end="url(#arrow)"/>

  <!-- Main PC -->
  <rect x="34" y="290" width="112" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="90" y="314" text-anchor="middle" class="label">Main PC</text>
  <text x="90" y="334" text-anchor="middle" class="sub">high draw</text>

  <!-- Secondary PC -->
  <rect x="159" y="290" width="112" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="215" y="314" text-anchor="middle" class="label">Secondary PC</text>
  <text x="215" y="334" text-anchor="middle" class="sub">medium draw</text>

  <!-- Router -->
  <rect x="284" y="290" width="112" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="340" y="314" text-anchor="middle" class="label">Router</text>
  <text x="340" y="334" text-anchor="middle" class="sub">low draw</text>

  <!-- Switch -->
  <rect x="409" y="290" width="112" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="465" y="314" text-anchor="middle" class="label">Switch</text>
  <text x="465" y="334" text-anchor="middle" class="sub">low draw</text>

  <!-- Raspberry Pi (planned) -->
  <rect x="534" y="290" width="112" height="56" rx="8" stroke-width="0.5" class="box-coral"/>
  <text x="590" y="311" text-anchor="middle" class="label" fill="#712B13">Raspberry Pi</text>
  <text x="590" y="331" text-anchor="middle" class="sub" fill="#993C1D">USB-C · planned</text>

  <!-- UPS (future) -->
  <path d="M340 370 L340 418" class="line-planned" marker-end="url(#arrow)"/>
  <rect x="195" y="420" width="290" height="56" rx="8" class="box-planned"/>
  <text x="340" y="444" text-anchor="middle" class="label" fill="#555">UPS (uninterruptible power supply)</text>
  <text x="340" y="464" text-anchor="middle" class="sub">future upgrade — battery backup</text>

  <!-- Legend -->
  <line x1="40" y1="390" x2="72" y2="390" stroke="#BA7517" stroke-width="1.5"/>
  <text x="78" y="394" class="sub" dominant-baseline="central">powered</text>
  <line x1="40" y1="408" x2="72" y2="408" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="78" y="412" class="sub" dominant-baseline="central">planned (future)</text>
</svg>
